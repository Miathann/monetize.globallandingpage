<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>monetize.global - Turn DMs Into Revenue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Backgrounds */
            --bg: #FFFFFF;             
            --bg-elevated: #F4F4F4;    /* Slightly darker for better section definition */
            --bg-card: #FFFFFF;        
            
            /* Fourmula.ai Signature Orange */
            --accent: #F94A00;         
            --accent-dim: rgba(249, 74, 0, 0.1);
            
            /* Typography (WCAG AA Compliant) */
            --text-100: #0B0B0B;       /* Black for Headings */
            --text-80: #2D2D2D;        /* Dark Grey for Body */
            --text-50: #555555;        /* Mid Grey (Darkened for AA compliance) */
            --text-30: #888888;        /* Light Grey (Darkened for better visibility) */
            --text-20: #D1D1D1;        /* Borders / Rules */
            
            /* Borders: Optimized for White Background Visibility */
            --border: rgba(0, 0, 0, 0.12);

            --font-display: 'Syne', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: var(--text-20) transparent;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text-100);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Focus States for Accessibility */
        :focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 4px;
        }

        /* ─── NAV ─── */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .nav__logo {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 700;
            color: var(--text-100);
            text-decoration: none;
            letter-spacing: -0.3px;
        }

        .nav__logo span { color: var(--accent); }

        .nav__cta {
            background: var(--text-100); /* Darker CTA for light mode premium feel */
            color: #FFF;
            text-decoration: none;
            font-family: var(--font-display);
            font-size: 13px;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 100px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .nav__cta:hover {
            background: var(--accent);
            transform: scale(1.02);
        }

        /* ─── HERO ─── */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 120px 40px 60px;
        }

        .hero__badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            padding: 8px 18px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-50);
            margin-bottom: 32px;
        }

        .hero__title {
            font-family: var(--font-display);
            font-size: clamp(40px, 7vw, 90px);
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            max-width: 1100px;
            margin-bottom: 30px;
        }

        .hero__title .dim { color: var(--text-30); }

        /* ─── SPLIT SECTIONS ─── */
        .split {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 60px;
            padding: 120px 40px;
            max-width: 1400px;
            margin: 0 auto;
            border-top: 1px solid var(--border);
        }

        .split__label {
            font-family: var(--font-display);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-30);
            position: sticky;
            top: 120px;
            height: fit-content;
        }

        /* ─── CARDS & FEATURES ─── */
        .problem-card, .feature, .step, .team-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            transition: all 0.3s ease;
        }

        .feature:hover {
            border-color: var(--accent);
            background: #FFFAF8; /* Very subtle orange tint */
        }

        .h2 {
            font-family: var(--font-display);
            font-size: clamp(30px, 4vw, 56px);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -1.5px;
            margin-bottom: 40px;
        }

        /* ─── GRID SYSTEMS ─── */
        .features, .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        /* ─── RESPONSIVENESS (MOBILE) ─── */
        @media (max-width: 1024px) {
            .split {
                grid-template-columns: 1fr;
                gap: 40px;
                padding: 80px 24px;
            }
            .split__label { position: static; margin-bottom: 20px; }
        }

        @media (max-width: 768px) {
            .nav { padding: 15px 20px; }
            .hero { padding: 100px 20px 40px; }
            .hero__title { letter-spacing: -1px; }
            .features, .team-grid { grid-template-columns: 1fr; }
            .problem-card, .feature, .step, .team-card { padding: 30px 20px; }
        }

        /* ─── GRAIN OVERLAY ─── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body>
    </body>
</html>
