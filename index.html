<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>monetize.global - Turn DMs Into Revenue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FFFFFF;             
            --bg-elevated: #F4F4F4;    
            --bg-card: #FFFFFF;        
            --accent: #F94A00;         
            --accent-dim: rgba(249, 74, 0, 0.1);
            --text-100: #0B0B0B;       
            --text-80: #2D2D2D;        
            --text-50: #555555;        
            --text-30: #888888;        
            --text-20: #D1D1D1;        
            --border: rgba(0, 0, 0, 0.08);
            --font-display: 'Syne', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text-100);
            line-height: 1.4;
            overflow-x: hidden;
        }

        /* ─── NAVIGATION: SHARP & FUNCTIONAL ─── */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav__logo {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 800;
            text-decoration: none;
            color: var(--text-100);
            letter-spacing: -0.03em;
        }

        .nav__logo span { color: var(--accent); }

        .nav__cta {
            background: var(--text-100);
            color: #FFF;
            text-decoration: none;
            font-family: var(--font-display);
            font-size: 13px;
            font-weight: 700;
            padding: 12px 28px;
            border-radius: 100px;
            transition: var(--transition);
        }

        .nav__cta:hover {
            background: var(--accent);
            transform: translateY(-1px);
        }

        /* ─── HERO: MAXIMUM TYPOGRAPHIC CONTRAST ─── */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .hero__badge {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            background: var(--accent-dim);
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 32px;
        }

        .hero__title {
            font-family: var(--font-display);
            font-size: clamp(40px, 9vw, 120px);
            font-weight: 800;
            line-height: 0.85;
            letter-spacing: -0.05em;
            margin-bottom: 40px;
        }

        .hero__title .dim {
            color: var(--text-20);
            transition: var(--transition);
        }

        .hero__title:hover .dim {
            color: var(--text-100);
        }

        .hero__description {
            font-size: clamp(18px, 2.5vw, 28px);
            max-width: 800px;
            color: var(--text-80);
            font-weight: 400;
            line-height: 1.3;
            letter-spacing: -0.01em;
            margin-bottom: 48px;
        }

        /* ─── SPLIT SECTION: FACTORY PRECISION ─── */
        .split {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 100px;
            padding: 120px 40px;
            max-width: 1400px;
            margin: 0 auto;
            border-top: 1px solid var(--border);
        }

        .split__label {
            font-family: var(--font-display);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-30);
            position: sticky;
            top: 120px;
            height: fit-content;
        }

        .h2 {
            font-family: var(--font-display);
            font-size: clamp(32px, 5vw, 72px);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.03em;
            margin-bottom: 60px;
        }

        /* ─── THE GRAIN OVERLAY ─── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        @media (max-width: 1024px) {
            .split { grid-template-columns: 1fr; gap: 40px; padding: 80px 24px; }
            .nav { padding: 20px; }
            .hero { padding: 0 24px; }
        }
    </style>
</head>
<body>

    <nav class="nav">
        <a href="#" class="nav__logo">monetize<span>.global</span></a>
        <a href="#" class="nav__cta">Join Waitlist</a>
    </nav>

    <main>
        <section class="hero">
            <div class="hero__badge">Available Now</div>
            <h1 class="hero__title">
                Turn DMs<br>
                <span class="dim">Into Revenue.</span>
            </h1>
            <p class="hero__description">
                The world’s first automated conversion layer for high-ticket creators. Stop losing leads to the "seen" receipt.
            </p>
        </section>

        <section class="split">
            <div class="split__label">01 // Overview</div>
            <div class="split__content">
                <h2 class="h2">Engineered for high-ticket conversion.</h2>
                </div>
        </section>
    </main>

</body>
</html>
